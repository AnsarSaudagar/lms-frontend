<div class="flex flex-col items-center text-center py-2">
  <div
    class="w-16 h-16 rounded-2xl flex items-center justify-center mb-5"
    style="background: var(--accent-12); border: 1px solid var(--accent-25)"
  >
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </svg>
  </div>

  <!-- Heading -->
  <h2 class="text-[22px] font-bold text-text tracking-[-0.02em] mb-1">
    Set new password
  </h2>
  <p class="text-[13px] text-text-section leading-[1.6] mb-6 max-w-[300px]">
    Must be at least 8 characters. Use a mix of letters, numbers, and symbols for a stronger password.
  </p>

  <!-- Form -->
  <form class="w-full flex flex-col gap-4 mb-5 text-left" [formGroup]="form" (ngSubmit)="submit()">

    <!-- New password -->
    <label class="flex flex-col gap-[6px]">
      <span class="text-[13px] text-text-label font-medium">New password</span>
      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          name="new-password"
          autocomplete="new-password"
          placeholder="••••••••"
          formControlName="password"
          class="w-full px-[14px] py-[11px] pr-10 rounded-lg border bg-surface-terminal text-text text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-12)]"
          [class.border-error-border]="form.get('password')?.invalid && form.get('password')?.touched"
          [class.border-border-input]="!(form.get('password')?.invalid && form.get('password')?.touched)"
        />
        <button
          type="button"
          class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-muted hover:text-text-input transition-colors duration-150 p-0"
          (click)="showPassword.set(!showPassword())"
        >
          @if (showPassword()) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
      @if (form.get('password')?.errors?.['required'] && form.get('password')?.touched) {
        <span class="text-[11px] text-error-text">Password is required</span>
      } @else if (form.get('password')?.errors?.['minlength'] && form.get('password')?.touched) {
        <span class="text-[11px] text-error-text">Must be at least 8 characters</span>
      }
    </label>

    <!-- Confirm password -->
    <label class="flex flex-col gap-[6px]">
      <span class="text-[13px] text-text-label font-medium">Confirm password</span>
      <div class="relative">
        <input
          [type]="showConfirm() ? 'text' : 'password'"
          name="confirm-password"
          autocomplete="new-password"
          placeholder="••••••••"
          formControlName="confirmPassword"
          class="w-full px-[14px] py-[11px] pr-10 rounded-lg border bg-surface-terminal text-text text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-12)]"
          [class.border-error-border]="(form.get('confirmPassword')?.touched && form.errors?.['mismatch']) || (form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched)"
          [class.border-border-input]="!((form.get('confirmPassword')?.touched && form.errors?.['mismatch']) || (form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched))"
        />
        <button
          type="button"
          class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-muted hover:text-text-input transition-colors duration-150 p-0"
          (click)="showConfirm.set(!showConfirm())"
        >
          @if (showConfirm()) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
      @if (form.get('confirmPassword')?.touched && form.errors?.['mismatch']) {
        <span class="text-[11px] text-error-text">Passwords do not match</span>
      }
    </label>

    <button
      type="submit"
      [disabled]="loading()"
      class="py-3 rounded-lg border-none bg-accent text-bg text-sm font-semibold cursor-pointer transition-[filter] duration-150 hover:brightness-[1.08] disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (loading()) {
        <span class="flex items-center justify-center gap-2">
          <svg class="animate-spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round" />
          </svg>
          Resetting…
        </span>
      } @else {
        Reset Password
      }
    </button>
  </form>

  <!-- Back -->
  <button
    class="border-none bg-transparent text-text-section text-[13px] cursor-pointer p-0 hover:text-text transition-colors duration-150"
    (click)="goBack()"
  >
    ← Back
  </button>
</div>
