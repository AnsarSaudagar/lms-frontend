<div class="flex flex-col items-center text-center py-2">
  <!-- Icon -->
  <div
    class="w-16 h-16 rounded-2xl flex items-center justify-center mb-5"
    style="background: var(--accent-12); border: 1px solid var(--accent-25)"
  >
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="3" />
      <path d="m2 7 10 7 10-7" />
    </svg>
  </div>

  <!-- Heading -->
  <h2 class="text-[22px] font-bold text-[var(--text)] tracking-[-0.02em] mb-1">
    Check your email
  </h2>
  <p class="text-[13px] text-[var(--text-section)] leading-[1.6] mb-6">
    We sent a 6-digit code to<br />
    <span class="text-[var(--text-primary)] font-semibold">{{ email() }}</span>
  </p>

  <!-- OTP Inputs -->
  <div class="flex gap-2 mb-6">
    @for (i of otpIndices; track i) {
      <input
        #otpInput
        type="text"
        inputmode="numeric"
        maxlength="1"
        class="w-11 h-12 rounded-[10px] border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-lg font-semibold text-center outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)] caret-transparent"
        [value]="otp[i]"
        (keydown)="onKeyDown($event, i)"
        (input)="onInput($event, i)"
        (paste)="onPaste($event)"
      />
    }
  </div>

  <!-- Verify Button -->
  <button
    class="w-full py-3 rounded-lg border-none bg-[var(--accent)] text-[oklch(0.12_0.015_255)] text-sm font-semibold cursor-pointer transition-[filter] duration-150 hover:brightness-[1.08] disabled:opacity-50 disabled:cursor-not-allowed mb-4"
    [disabled]="loading() || otp.join('').length < 6"
    (click)="verify()"
  >
    @if (loading()) {
      <span class="flex items-center justify-center gap-2">
        <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"/>
        </svg>
        Verifying…
      </span>
    } @else {
      Verify Email
    }
  </button>

  <!-- Resend -->
  <p class="text-[13px] text-[var(--muted)]">
    Didn't receive it?&nbsp;
    @if (countdown() > 0) {
      <span class="text-[var(--text-section)]">Resend in {{ countdown() }}s</span>
    } @else {
      <button
        class="border-none bg-transparent text-[var(--accent)] cursor-pointer text-[13px] p-0 font-medium hover:underline"
        (click)="resend()"
      >
        Resend code
      </button>
    }
  </p>

  <!-- Back -->
  <button
    class="mt-4 border-none bg-transparent text-[var(--text-section)] text-[13px] cursor-pointer p-0 hover:text-[var(--text)] transition-colors duration-150"
    (click)="goBack()"
  >
    ← Back to sign up
  </button>
</div>
