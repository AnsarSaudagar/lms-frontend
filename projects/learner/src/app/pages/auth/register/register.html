<form [formGroup]="signupForm" (ngSubmit)="handleSubmit()" class="flex flex-col gap-4 mb-5">

  <div class="flex gap-3">
    <label class="flex flex-col gap-[6px] flex-1">
      <span class="text-[13px] text-[var(--text-label)] font-medium">
        First Name <span class="text-[var(--error-text)]">*</span>
      </span>
      <input
        formControlName="firstName"
        class="px-[14px] py-[11px] rounded-lg border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)]"
        type="text"
        placeholder="Jane"
      />
    </label>

    <label class="flex flex-col gap-[6px] w-[90px]">
      <span class="text-[13px] text-[var(--text-label)] font-medium">
        Middle
      </span>
      <input
        formControlName="middleName"
        class="px-[14px] py-[11px] rounded-lg border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)]"
        type="text"
        placeholder="M."
      />
    </label>
  </div>

  <label class="flex flex-col gap-[6px]">
    <span class="text-[13px] text-[var(--text-label)] font-medium">
      Last Name <span class="text-[var(--error-text)]">*</span>
    </span>
    <input
      formControlName="lastName"
      class="px-[14px] py-[11px] rounded-lg border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)]"
      type="text"
      placeholder="Smith"
    />
  </label>

  <label class="flex flex-col gap-[6px]">
    <span class="text-[13px] text-[var(--text-label)] font-medium">
      Email <span class="text-[var(--error-text)]">*</span>
    </span>
    <input
      formControlName="email"
      class="px-[14px] py-[11px] rounded-lg border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)]"
      type="email"
      placeholder="you@example.com"
    />
  </label>

  <label class="flex flex-col gap-[6px]">
    <span class="text-[13px] text-[var(--text-label)] font-medium">
      Password <span class="text-[var(--error-text)]">*</span>
    </span>
    <input
      formControlName="password"
      class="px-[14px] py-[11px] rounded-lg border border-[var(--border-input)] bg-[var(--surface-terminal)] text-[var(--text)] text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-12)]"
      type="password"
      placeholder="••••••••"
    />
  </label>

  <button
    type="submit"
    [disabled]="loading()"
    class="py-3 rounded-lg border-none bg-[var(--accent)] text-[oklch(0.12_0.015_255)] text-sm font-semibold cursor-pointer transition-[filter] duration-150 hover:brightness-[1.08] disabled:cursor-not-allowed disabled:opacity-50"
  >
    @if (loading()) {
      <span class="flex items-center justify-center gap-2">
        <svg class="animate-spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"/>
        </svg>
        Creating Account…
      </span>
    } @else {
      Create Account
    }
  </button>
</form>
