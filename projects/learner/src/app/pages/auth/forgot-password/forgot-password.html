<div class="flex flex-col items-center text-center py-2">
  <!-- Icon -->
  <div
    class="w-16 h-16 rounded-2xl flex items-center justify-center mb-5"
    style="background: var(--accent-12); border: 1px solid var(--accent-25)"
  >
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </svg>
  </div>

  <!-- Heading -->
  <h2 class="text-[22px] font-bold text-text tracking-[-0.02em] mb-1">
    Forgot password?
  </h2>
  <p class="text-[13px] text-text-section leading-[1.6] mb-6">
    No worries — enter your email and we'll send a reset code.
  </p>

  <!-- Form -->
  <form class="w-full flex flex-col gap-4 mb-5 text-left" [formGroup]="form" (ngSubmit)="submit()">
    <label class="flex flex-col gap-[6px]">
      <span class="text-[13px] text-text-label font-medium">Email address</span>
      <input
        type="email"
        name="email"
        autocomplete="email"
        placeholder="you@example.com"
        formControlName="email"
        class="px-[14px] py-[11px] rounded-lg border bg-surface-terminal text-text text-sm outline-none transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--accent-12)]"
        [class.border-error-border]="form.get('email')?.invalid && form.get('email')?.touched"
        [class.border-border-input]="!(form.get('email')?.invalid && form.get('email')?.touched)"
      />
      @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <span class="text-[11px] text-error-text">Enter a valid email address</span>
      }
    </label>

    <button
      type="submit"
      [disabled]="loading()"
      class="py-3 rounded-lg border-none bg-accent text-bg text-sm font-semibold cursor-pointer transition-[filter] duration-150 hover:brightness-[1.08] disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (loading()) {
        <span class="flex items-center justify-center gap-2">
          <svg class="animate-spin" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round" />
          </svg>
          Sending…
        </span>
      } @else {
        Send Reset Code
      }
    </button>
  </form>

  <!-- Back -->
  <button
    class="border-none bg-transparent text-text-section text-[13px] cursor-pointer p-0 hover:text-text transition-colors duration-150"
    (click)="goBack()"
  >
    ← Back to sign in
  </button>
</div>
